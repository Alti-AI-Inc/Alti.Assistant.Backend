name: Update Frontend Proxy to Cloud Run

on:
  workflow_dispatch:

env:
  VM_USER: alti_deployer
  VM_HOST: 35.239.192.33

jobs:
  update-proxy:
    name: Update Nginx Proxy
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/alti-vm-key
          chmod 600 ~/.ssh/alti-vm-key
          ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Write nginx config file locally
        run: |
          cat > /tmp/alti.frontend.conf << 'EOF'
          server {
              server_name altihq.com www.altihq.com;

              location / {
                  proxy_pass https://alti-assistant-frontend-366561755636.us-central1.run.app;
                  proxy_ssl_server_name on;
                  proxy_set_header Host alti-assistant-frontend-366561755636.us-central1.run.app;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_set_header X-Forwarded-Host $host;
                  proxy_http_version 1.1;
                  proxy_set_header Connection "";
                  proxy_buffering off;
              }

              location /api/v1 {
                  proxy_pass http://localhost:5100;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
              }

              listen 443 ssl; # managed by Certbot
              ssl_certificate /etc/letsencrypt/live/altihq.com/fullchain.pem; # managed by Certbot
              ssl_certificate_key /etc/letsencrypt/live/altihq.com/privkey.pem; # managed by Certbot
              include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
              ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
          }

          server {
              if ($host = www.altihq.com) {
                  return 301 https://$host$request_uri;
              } # managed by Certbot

              if ($host = altihq.com) {
                  return 301 https://$host$request_uri;
              } # managed by Certbot

              listen 80;
              server_name altihq.com www.altihq.com;
              return 404; # managed by Certbot
          }
          EOF

      - name: Upload and apply to BOTH sites-available AND sites-enabled
        run: |
          scp -i ~/.ssh/alti-vm-key /tmp/alti.frontend.conf ${{ env.VM_USER }}@${{ env.VM_HOST }}:/tmp/alti.frontend.conf.new

          ssh -i ~/.ssh/alti-vm-key ${{ env.VM_USER }}@${{ env.VM_HOST }} 'set -e;
            echo "=== Backing up configs ===";
            sudo cp /etc/nginx/sites-available/alti.frontend.conf /etc/nginx/sites-available/alti.frontend.conf.bak.$(date +%Y%m%d%H%M%S) 2>/dev/null || true;
            sudo cp /etc/nginx/sites-enabled/alti.frontend.conf /etc/nginx/sites-enabled/alti.frontend.conf.bak2.$(date +%Y%m%d%H%M%S) 2>/dev/null || true;
            echo "";
            echo "=== Installing to sites-available ===";
            sudo cp /tmp/alti.frontend.conf.new /etc/nginx/sites-available/alti.frontend.conf;
            echo "=== Installing to sites-enabled ===";
            sudo cp /tmp/alti.frontend.conf.new /etc/nginx/sites-enabled/alti.frontend.conf;
            rm /tmp/alti.frontend.conf.new;
            echo "";
            echo "=== Verify sites-available config ===";
            grep "proxy_pass" /etc/nginx/sites-available/alti.frontend.conf;
            echo "=== Verify sites-enabled config ===";
            grep "proxy_pass" /etc/nginx/sites-enabled/alti.frontend.conf;
            echo "";
            echo "=== Testing nginx config ===";
            sudo nginx -t;
            echo "";
            echo "=== Hard restart nginx ===";
            sudo systemctl stop nginx;
            sleep 2;
            sudo systemctl start nginx;
            echo "";
            echo "=== Nginx status ===";
            sudo systemctl status nginx --no-pager;
            echo "";
            echo "=== DONE ==="'

      - name: Verify live site serves Cloud Run content
        run: |
          sleep 5
          echo "=== altihq.com CSS ==="
          curl -s https://altihq.com | grep -oP '_next/static/chunks/[a-f0-9]+\.css' | sort -u
          echo "=== Cloud Run CSS ==="
          curl -s https://alti-assistant-frontend-366561755636.us-central1.run.app | grep -oP '_next/static/chunks/[a-f0-9]+\.css' | sort -u
          echo ""
          echo "=== altihq.com headers ==="
          curl -sI https://altihq.com | grep -i "server\|cache-control\|pragma\|x-cloud"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/alti-vm-key

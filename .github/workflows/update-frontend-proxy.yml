name: Update Frontend Proxy to Cloud Run

on:
  workflow_dispatch:

env:
  VM_USER: alti_deployer
  VM_HOST: 35.239.192.33

jobs:
  update-proxy:
    name: Update Nginx Proxy
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/alti-vm-key
          chmod 600 ~/.ssh/alti-vm-key
          ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Write nginx config file locally
        run: |
          cat > /tmp/alti.frontend.conf << 'EOF'
          server {
              server_name altihq.com www.altihq.com;

              location / {
                  proxy_pass https://alti-assistant-frontend-366561755636.us-central1.run.app;
                  proxy_ssl_server_name on;
                  proxy_set_header Host alti-assistant-frontend-366561755636.us-central1.run.app;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_set_header X-Forwarded-Host $host;
                  proxy_http_version 1.1;
                  proxy_set_header Connection "";
                  proxy_buffering off;
              }

              location /api/v1 {
                  proxy_pass http://localhost:5100;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
              }

              listen 443 ssl; # managed by Certbot
              ssl_certificate /etc/letsencrypt/live/altihq.com/fullchain.pem; # managed by Certbot
              ssl_certificate_key /etc/letsencrypt/live/altihq.com/privkey.pem; # managed by Certbot
              include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
              ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
          }

          server {
              if ($host = www.altihq.com) {
                  return 301 https://$host$request_uri;
              } # managed by Certbot

              if ($host = altihq.com) {
                  return 301 https://$host$request_uri;
              } # managed by Certbot

              listen 80;
              server_name altihq.com www.altihq.com;
              return 404; # managed by Certbot
          }
          EOF

      - name: Upload config and apply
        run: |
          # Upload the new config
          scp -i ~/.ssh/alti-vm-key /tmp/alti.frontend.conf ${{ env.VM_USER }}@${{ env.VM_HOST }}:/tmp/alti.frontend.conf.new

          # Apply it on the VM
          ssh -i ~/.ssh/alti-vm-key ${{ env.VM_USER }}@${{ env.VM_HOST }} 'set -e;
            echo "=== Backing up current config ===";
            sudo cp /etc/nginx/sites-enabled/alti.frontend.conf /etc/nginx/sites-enabled/alti.frontend.conf.bak.$(date +%Y%m%d%H%M%S);
            echo "=== Installing new config ===";
            sudo cp /tmp/alti.frontend.conf.new /etc/nginx/sites-enabled/alti.frontend.conf;
            rm /tmp/alti.frontend.conf.new;
            echo "=== New config ===";
            cat /etc/nginx/sites-enabled/alti.frontend.conf;
            echo "";
            echo "=== Testing nginx config ===";
            sudo nginx -t;
            echo "";
            echo "=== Killing old next-server on port 3000 ===";
            sudo kill $(sudo ss -tlnp | grep ":3000" | grep -oP "pid=\K[0-9]+") 2>/dev/null || echo "No process on port 3000";
            echo "";
            echo "=== Restarting nginx ===";
            sudo systemctl restart nginx;
            echo "";
            echo "=== DONE ===";
            sudo systemctl status nginx --no-pager'

      - name: Verify live site
        run: |
          sleep 5
          echo "=== altihq.com headers ==="
          curl -sI https://altihq.com | grep -i "server\|cache-control\|x-nextjs\|x-cloud\|pragma"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/alti-vm-key

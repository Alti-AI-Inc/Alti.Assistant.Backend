name: Update Frontend Proxy to Cloud Run

on:
  workflow_dispatch:

env:
  VM_USER: alti_deployer
  VM_HOST: 35.239.192.33

jobs:
  update-proxy:
    name: Update Nginx Proxy
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/alti-vm-key
          chmod 600 ~/.ssh/alti-vm-key
          ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Switch frontend proxy to Cloud Run
        run: |
          ssh -i ~/.ssh/alti-vm-key ${{ env.VM_USER }}@${{ env.VM_HOST }} bash <<'SCRIPT'
            set -e

            CONF="/etc/nginx/sites-enabled/alti.frontend.conf"
            CLOUD_RUN_HOST="alti-assistant-frontend-366561755636.us-central1.run.app"

            echo "=== Backing up current config ==="
            sudo cp "$CONF" "${CONF}.bak.$(date +%Y%m%d%H%M%S)"

            echo "=== Writing new nginx config ==="
            sudo tee "$CONF" > /dev/null <<'NGINX'
            server {
                server_name altihq.com www.altihq.com;

                location / {
                    proxy_pass https://alti-assistant-frontend-366561755636.us-central1.run.app;
                    proxy_ssl_server_name on;
                    proxy_set_header Host alti-assistant-frontend-366561755636.us-central1.run.app;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_set_header X-Forwarded-Host $host;
                    proxy_http_version 1.1;
                    proxy_set_header Connection "";
                    proxy_buffering off;
                }

                location /api/v1 {
                    proxy_pass http://localhost:5100;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                }

                listen 443 ssl; # managed by Certbot
                ssl_certificate /etc/letsencrypt/live/altihq.com/fullchain.pem; # managed by Certbot
                ssl_certificate_key /etc/letsencrypt/live/altihq.com/privkey.pem; # managed by Certbot
                include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
            }

            server {
                if ($host = www.altihq.com) {
                    return 301 https://$host$request_uri;
                } # managed by Certbot

                if ($host = altihq.com) {
                    return 301 https://$host$request_uri;
                } # managed by Certbot

                listen 80;
                server_name altihq.com www.altihq.com;
                return 404; # managed by Certbot
            }
            NGINX

            echo ""
            echo "=== New config ==="
            cat "$CONF"

            echo ""
            echo "=== Testing nginx config ==="
            sudo nginx -t

            echo ""
            echo "=== Stopping old standalone next-server process ==="
            sudo kill $(sudo ss -tlnp | grep ':3000' | grep -oP 'pid=\K[0-9]+') 2>/dev/null || echo "No process to kill on port 3000"

            echo ""
            echo "=== Restarting nginx ==="
            sudo systemctl restart nginx

            echo ""
            echo "=== DONE! Frontend now proxies to Cloud Run ==="
            sudo systemctl status nginx --no-pager
          SCRIPT

      - name: Verify live site serves new content
        run: |
          sleep 3
          echo "=== Checking altihq.com response headers ==="
          curl -sI https://altihq.com | head -20
          echo ""
          echo "=== Checking for Cloud Run trace header ==="
          curl -sI https://altihq.com | grep -i "x-cloud-trace\|cache-control\|server\|x-nextjs"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/alti-vm-key

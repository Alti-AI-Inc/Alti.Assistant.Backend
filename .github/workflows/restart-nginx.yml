name: Restart Nginx on VM

on:
  workflow_dispatch:

env:
  VM_USER: alti_deployer
  VM_HOST: 35.239.192.33

jobs:
  restart-nginx:
    name: Restart Nginx
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/alti-vm-key
          chmod 600 ~/.ssh/alti-vm-key
          ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Diagnose and force-fix
        run: |
          ssh -i ~/.ssh/alti-vm-key ${{ env.VM_USER }}@${{ env.VM_HOST }} 'set -e;
            echo "=== What is on port 3000? ===";
            sudo ss -tlnp | grep 3000 || echo "Nothing on port 3000";
            echo "";
            echo "=== Current nginx config ===";
            grep -A2 "proxy_pass" /etc/nginx/sites-enabled/alti.frontend.conf;
            echo "";
            echo "=== Force killing everything on port 3000 ===";
            sudo fuser -k 3000/tcp 2>/dev/null || echo "fuser: nothing to kill";
            sleep 1;
            echo "";
            echo "=== Port 3000 after kill ===";
            sudo ss -tlnp | grep 3000 || echo "Port 3000 is now free";
            echo "";
            echo "=== Restarting nginx ===";
            sudo systemctl restart nginx;
            echo "=== Done ===";
            sudo systemctl status nginx --no-pager'

      - name: Verify from GitHub Actions runner
        run: |
          sleep 5
          echo "=== altihq.com CSS chunks ==="
          curl -s https://altihq.com | grep -oP '_next/static/chunks/[a-f0-9]+\.css' | head -5
          echo ""
          echo "=== Cloud Run CSS chunks ==="
          curl -s https://alti-assistant-frontend-366561755636.us-central1.run.app | grep -oP '_next/static/chunks/[a-f0-9]+\.css' | head -5
          echo ""
          echo "=== altihq.com headers ==="
          curl -sI https://altihq.com | grep -i "server\|cache\|pragma\|x-cloud"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/alti-vm-key

name: Deploy to VM

on:
  push:
    branches:
      - dev

env:
  REGISTRY: us-central1-docker.pkg.dev/alti-assistant-prod/alti-assistant-core-backend-repo
  IMAGE_NAME: alti-assistant-backend
  VM_USER: emondarock
  VM_HOST: 104.197.53.196
  COMPOSE_DIR: "~"
  COMPOSE_FILE: docker-compose.yml

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up version tag
        id: vars
        run: |
          VERSION="v$(date +'%Y%m%d')-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image_version=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION" >> $GITHUB_OUTPUT
          echo "image_latest=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCP Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.vars.outputs.image_version }}
            ${{ steps.vars.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/alti-vm-key
          chmod 600 ~/.ssh/alti-vm-key
          ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VM
        run: |
          ssh -i ~/.ssh/alti-vm-key ${{ env.VM_USER }}@${{ env.VM_HOST }} bash << 'EOF'
            set -e
            echo "Navigating to compose directory..."
            cd ${{ env.COMPOSE_DIR }}
            echo "Stopping existing containers..."
            docker compose -f ${{ env.COMPOSE_FILE }} down
            echo "Pulling latest images..."
            docker compose -f ${{ env.COMPOSE_FILE }} pull
            echo "Starting containers..."
            docker compose -f ${{ env.COMPOSE_FILE }} up -d
            echo "Checking container status..."
            docker compose -f ${{ env.COMPOSE_FILE }} ps
            echo "Deployment completed successfully!"
          EOF

      - name: Fetch recent logs
        run: |
          ssh -i ~/.ssh/alti-vm-key ${{ env.VM_USER }}@${{ env.VM_HOST }} \
            "cd ${{ env.COMPOSE_DIR }} && docker compose -f ${{ env.COMPOSE_FILE }} logs --tail=20"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/alti-vm-key

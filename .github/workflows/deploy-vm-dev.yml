name: Deploy VM (dev)

on:
  push:
    branches:
      - dev

permissions:
  contents: read

env:
  REGISTRY: us-central1-docker.pkg.dev/alti-assistant-prod/alti-assistant-core-backend-repo
  IMAGE_NAME: alti-assistant-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set image tags
        run: |
          echo "VERSION=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "IMAGE_TAG_VERSION=${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "IMAGE_TAG_LATEST=${REGISTRY}/${IMAGE_NAME}:latest" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t "$IMAGE_TAG_VERSION" \
            -t "$IMAGE_TAG_LATEST" \
            --push .

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG_LATEST: ${{ env.IMAGE_TAG_LATEST }}
          COMPOSE_DIR: ${{ secrets.VM_COMPOSE_DIR }}
          COMPOSE_FILE: ${{ secrets.VM_COMPOSE_FILE }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT }}
          envs: IMAGE_TAG_LATEST,COMPOSE_DIR,COMPOSE_FILE
          script: |
            set -e
            echo "Navigating to compose directory..."
            cd /home/emondarock
            echo "Stopping existing containers..."
            docker compose -f "$COMPOSE_FILE" down
            echo "Removing old image..."
            docker image rm -f "$IMAGE_TAG_LATEST" || true
            echo "Pulling latest image..."
            docker compose -f "$COMPOSE_FILE" pull
            echo "Starting containers..."
            docker compose -f "$COMPOSE_FILE" up -d
            echo "Checking container status..."
            docker compose -f "$COMPOSE_FILE" ps

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Streaming Search Test</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        text-align: center;
      }

      .header h1 {
        font-size: 28px;
        margin-bottom: 10px;
      }

      .header p {
        opacity: 0.9;
        font-size: 14px;
      }

      .input-section {
        padding: 30px;
        border-bottom: 1px solid #e0e0e0;
      }

      .input-group {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
      }

      input[type='text'] {
        flex: 1;
        padding: 12px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 15px;
        transition: border-color 0.3s;
      }

      input[type='text']:focus {
        outline: none;
        border-color: #667eea;
      }

      button {
        padding: 12px 24px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      button:active {
        transform: translateY(0);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .status {
        padding: 10px 15px;
        border-radius: 6px;
        font-size: 13px;
        margin-top: 15px;
        display: none;
      }

      .status.connected {
        background: #e8f5e9;
        color: #2e7d32;
        display: block;
      }

      .status.error {
        background: #ffebee;
        color: #c62828;
        display: block;
      }

      .status.streaming {
        background: #e3f2fd;
        color: #1565c0;
        display: block;
      }

      .output-section {
        padding: 30px;
        max-height: 600px;
        overflow-y: auto;
      }

      .event {
        margin-bottom: 15px;
        padding: 15px;
        border-radius: 8px;
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .event-thinking {
        background: #fff3e0;
        border-left: 4px solid #ff9800;
      }

      .event-text {
        background: #e8f5e9;
        border-left: 4px solid #4caf50;
      }

      .event-metadata {
        background: #e3f2fd;
        border-left: 4px solid #2196f3;
      }

      .event-connected {
        background: #f3e5f5;
        border-left: 4px solid #9c27b0;
      }

      .event-done {
        background: #e0f2f1;
        border-left: 4px solid #009688;
      }

      .event-error {
        background: #ffebee;
        border-left: 4px solid #f44336;
      }

      .event-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .event-type {
        font-weight: 600;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 0.5px;
      }

      .event-timestamp {
        font-size: 11px;
        opacity: 0.6;
      }

      .event-content {
        font-size: 14px;
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .references {
        margin-top: 10px;
      }

      .reference-item {
        background: white;
        padding: 8px;
        margin: 5px 0;
        border-radius: 4px;
        font-size: 12px;
      }

      .reference-item a {
        color: #667eea;
        text-decoration: none;
      }

      .reference-item a:hover {
        text-decoration: underline;
      }

      .loading {
        display: none;
        text-align: center;
        padding: 20px;
      }

      .loading.active {
        display: block;
      }

      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #667eea;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🔍 Streaming Search Test</h1>
        <p>Real-time streaming with visible thinking process</p>
      </div>

      <div class="input-section">
        <div class="input-group">
          <input
            type="text"
            id="queryInput"
            placeholder="Ask a question... (e.g., 'What is the weather in Detroit?')"
          />
          <button id="sendBtn" onclick="sendQuery()">Send</button>
          <button id="clearBtn" onclick="clearOutput()">Clear</button>
        </div>
        <div class="input-group">
          <input
            type="text"
            id="conversationId"
            placeholder="Conversation ID (optional - for follow-up questions)"
          />
        </div>
        <div class="input-group">
          <input
            type="text"
            id="apiUrl"
            value="http://localhost:5000/api/v1/search/stream"
            placeholder="API Endpoint URL"
          />
        </div>
        <div id="status" class="status"></div>
      </div>

      <div class="output-section" id="output">
        <div style="text-align: center; color: #999; padding: 40px">
          <p>👆 Enter a query above and click Send to start streaming</p>
          <p style="margin-top: 10px; font-size: 13px">
            Try: "When is the next Detroit Red Wings game?"
          </p>
        </div>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="margin-top: 10px; color: #666">Connecting...</p>
      </div>
    </div>

    <script>
      let currentEventSource = null;
      let fullText = '';

      function showStatus(message, type) {
        const status = document.getElementById('status');
        status.textContent = message;
        status.className = `status ${type}`;
      }

      function addEvent(type, content, data = {}) {
        const output = document.getElementById('output');
        const event = document.createElement('div');
        event.className = `event event-${type}`;

        const timestamp = new Date(
          data.timestamp || Date.now()
        ).toLocaleTimeString();

        let contentHtml = '';
        if (type === 'metadata' && data.reference) {
          contentHtml = `
                    <div class="references">
                        <strong>📚 Sources (${data.reference.length}):</strong>
                        ${data.reference
                          .map(
                            (ref, i) => `
                            <div class="reference-item">
                                ${i + 1}. <a href="${ref.url}" target="_blank">${ref.domain || ref.title || ref.url}</a>
                            </div>
                        `
                          )
                          .join('')}
                    </div>
                `;
        } else {
          contentHtml = `<div class="event-content">${content}</div>`;
        }

        event.innerHTML = `
                <div class="event-header">
                    <span class="event-type">${type === 'thinking' ? '🧠 ' : type === 'text' ? '💬 ' : type === 'metadata' ? '📚 ' : ''}${type}</span>
                    <span class="event-timestamp">${timestamp}</span>
                </div>
                ${contentHtml}
            `;

        output.appendChild(event);
        output.scrollTop = output.scrollHeight;
      }

      function clearOutput() {
        document.getElementById('output').innerHTML = '';
        fullText = '';
        showStatus('', '');
        if (currentEventSource) {
          currentEventSource.close();
          currentEventSource = null;
        }
      }

      async function sendQuery() {
        const query = document.getElementById('queryInput').value.trim();
        const conversationId = document
          .getElementById('conversationId')
          .value.trim();
        const apiUrl = document.getElementById('apiUrl').value.trim();

        if (!query) {
          alert('Please enter a query');
          return;
        }

        // Close any existing connection
        if (currentEventSource) {
          currentEventSource.close();
        }

        // Clear previous output
        clearOutput();

        // Disable send button
        const sendBtn = document.getElementById('sendBtn');
        sendBtn.disabled = true;
        sendBtn.textContent = 'Streaming...';

        showStatus('Connecting to server...', 'streaming');
        document.getElementById('loading').classList.add('active');

        fullText = '';

        try {
          const requestBody = { message: query };
          if (conversationId) {
            requestBody.conversationId = conversationId;
          }

          const response = await fetch(apiUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Accept: 'text/event-stream',
            },
            body: JSON.stringify(requestBody),
          });

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          document.getElementById('loading').classList.remove('active');

          const reader = response.body.getReader();
          const decoder = new TextDecoder();

          while (true) {
            const { value, done } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            const lines = chunk.split('\n');

            for (const line of lines) {
              if (line.startsWith('data: ')) {
                const data = JSON.parse(line.slice(6));

                switch (data.type) {
                  case 'connected':
                    showStatus(
                      `Connected! Conversation ID: ${data.conversationId}`,
                      'connected'
                    );
                    document.getElementById('conversationId').value =
                      data.conversationId;
                    addEvent(
                      'connected',
                      `Conversation ID: ${data.conversationId}`,
                      data
                    );
                    break;

                  case 'thinking':
                    showStatus('Model is thinking...', 'streaming');
                    addEvent('thinking', data.content, data);
                    break;

                  case 'text':
                    showStatus('Streaming response...', 'streaming');
                    fullText += data.content;
                    addEvent('text', data.content, data);
                    break;

                  case 'metadata':
                    addEvent('metadata', '', data);
                    break;

                  case 'done':
                    showStatus(
                      `✅ Complete! (${data.messageCount} messages)`,
                      'connected'
                    );
                    addEvent(
                      'done',
                      `Conversation complete. Message count: ${data.messageCount}`,
                      data
                    );
                    break;

                  case 'error':
                    showStatus(`❌ Error: ${data.error}`, 'error');
                    addEvent('error', data.error, data);
                    break;
                }
              }
            }
          }
        } catch (error) {
          console.error('Error:', error);
          showStatus(`❌ Error: ${error.message}`, 'error');
          addEvent('error', error.message);
          document.getElementById('loading').classList.remove('active');
        } finally {
          sendBtn.disabled = false;
          sendBtn.textContent = 'Send';
        }
      }

      // Allow Enter key to send
      document
        .getElementById('queryInput')
        .addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            sendQuery();
          }
        });
    </script>
  </body>
</html>
